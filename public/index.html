<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konstantin Podlesnykh — Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --text-3xl: clamp(2.5rem, 1rem + 4vw, 5rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem; --space-20: 5rem; --space-24: 6rem;
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9; --color-surface-offset: #f0ede8; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #6f6c66; --color-text-faint: #afaca6; --color-text-inverse: #f9f8f4;
      --color-primary: #01696f; --color-primary-hover: #0c4e54; --color-primary-highlight: #d6e5e3; --color-blue: #006494; --color-success: #437a22;
      --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(30,24,16,.05); --shadow-md: 0 8px 24px rgba(30,24,16,.08); --shadow-lg: 0 20px 60px rgba(30,24,16,.12);
      --content-default: 1120px;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Work Sans', system-ui, sans-serif;
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d; --color-surface-offset: #252320; --color-border: #393836; --color-divider: #262523;
      --color-text: #ece9e3; --color-text-muted: #b5b0a8; --color-text-faint: #7d786f; --color-text-inverse: #171614;
      --color-primary: #5ea7ae; --color-primary-hover: #7ab8be; --color-primary-highlight: #233638; --color-blue: #79a9d7; --color-success: #89c46a;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.2); --shadow-md: 0 8px 24px rgba(0,0,0,.28); --shadow-lg: 0 20px 60px rgba(0,0,0,.38);
    }
    * ,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);font-size:var(--text-base);background:var(--color-bg);color:var(--color-text);line-height:1.6}
    a,button{transition:all var(--transition-interactive)}
    img,svg{display:block;max-width:100%}
    .container{width:min(calc(100% - 2rem),var(--content-default));margin-inline:auto}
    .skip-link{position:absolute;left:-9999px;top:auto}.skip-link:focus{left:1rem;top:1rem;background:var(--color-primary);color:var(--color-text-inverse);padding:.75rem 1rem;border-radius:var(--radius-md);z-index:1000}
    .site-header{position:sticky;top:0;z-index:20;background:color-mix(in srgb, var(--color-bg) 86%, transparent);backdrop-filter:blur(14px);border-bottom:1px solid color-mix(in srgb,var(--color-text) 10%, transparent)}
    .header-row{display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);padding:var(--space-4) 0}
    .brand{display:flex;align-items:center;gap:var(--space-3);text-decoration:none;color:inherit}
    .brand-mark{width:2.5rem;height:2.5rem;border-radius:var(--radius-lg);display:grid;place-items:center;background:linear-gradient(135deg,var(--color-primary-highlight),var(--color-surface-2));border:1px solid color-mix(in srgb,var(--color-primary) 20%, var(--color-border));color:var(--color-primary)}
    .brand-name{font-weight:700;font-size:var(--text-sm);letter-spacing:.04em;text-transform:uppercase}
    .nav{display:flex;gap:var(--space-4);flex-wrap:wrap;align-items:center}
    .nav a{color:var(--color-text-muted);text-decoration:none;font-size:var(--text-sm)}
    .nav a:hover,.nav a:focus-visible{color:var(--color-text)}
    .theme-toggle,.menu-toggle{border:1px solid color-mix(in srgb,var(--color-text) 14%, transparent);background:var(--color-surface);color:var(--color-text);border-radius:var(--radius-full);min-width:44px;min-height:44px;padding:0 .85rem;display:inline-flex;align-items:center;justify-content:center;gap:.5rem;box-shadow:var(--shadow-sm)}
    .menu-toggle{display:none}
    main section{padding:clamp(var(--space-12),8vw,var(--space-24)) 0}
    .hero{padding-top:clamp(var(--space-12),10vw,var(--space-24))}
    .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:var(--space-8);align-items:end}
    .eyebrow{display:inline-flex;align-items:center;gap:.5rem;padding:.45rem .8rem;border-radius:var(--radius-full);background:var(--color-primary-highlight);color:var(--color-primary);font-size:var(--text-xs);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    h1,h2,h3{font-family:var(--font-display);line-height:1.02;font-weight:500}
    h1{font-size:var(--text-3xl);max-width:11ch;letter-spacing:-.03em}
    h2{font-size:var(--text-2xl);margin-bottom:var(--space-4)}
    h3{font-size:var(--text-xl)}
    .hero p{font-size:var(--text-lg);color:var(--color-text-muted);max-width:40rem;margin-top:var(--space-5)}
    .hero-actions{display:flex;gap:var(--space-3);flex-wrap:wrap;margin-top:var(--space-8)}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:.9rem 1.2rem;border-radius:var(--radius-full);text-decoration:none;font-weight:600;border:1px solid transparent}
    .btn-primary{background:var(--color-primary);color:var(--color-text-inverse);box-shadow:var(--shadow-md)}
    .btn-primary:hover{background:var(--color-primary-hover)}
    .btn-secondary{background:var(--color-surface);color:var(--color-text);border-color:color-mix(in srgb,var(--color-text) 12%, transparent)}
    .hero-card,.card,.timeline-item,.contact-card{background:var(--color-surface);border:1px solid color-mix(in srgb,var(--color-text) 10%, transparent);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm)}
    .hero-card{padding:var(--space-8);display:grid;gap:var(--space-6);position:relative;overflow:hidden}
    .hero-card::after{content:"";position:absolute;inset:auto -2rem -3rem auto;width:10rem;height:10rem;background:radial-gradient(circle,var(--color-primary-highlight),transparent 65%);opacity:.85}
    .metric-grid,.services-grid,.proof-grid,.cv-grid,.contact-grid{display:grid;gap:var(--space-4)}
    .metric-grid{grid-template-columns:repeat(3,1fr)}
    .metric{padding:var(--space-4);background:var(--color-surface-2);border-radius:var(--radius-lg);border:1px solid color-mix(in srgb,var(--color-text) 8%, transparent)}
    .metric strong{display:block;font-size:var(--text-xl);font-family:var(--font-display)}
    .section-intro{display:grid;grid-template-columns:.8fr 1.2fr;gap:var(--space-8);margin-bottom:var(--space-8);align-items:start}
    .kicker{font-size:var(--text-xs);font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--color-primary);margin-bottom:var(--space-3)}
    .muted{color:var(--color-text-muted)}
    .services-grid{grid-template-columns:repeat(2,1fr)}
    .card{padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-4)}
    .pill-row{display:flex;flex-wrap:wrap;gap:.55rem}
    .pill{padding:.45rem .7rem;border-radius:var(--radius-full);background:var(--color-surface-offset);font-size:var(--text-xs);color:var(--color-text-muted);border:1px solid color-mix(in srgb,var(--color-text) 8%, transparent)}
    .proof-grid{grid-template-columns:repeat(3,1fr)}
    .timeline{display:grid;gap:var(--space-4)}
    .timeline-item{padding:var(--space-6)}
    .timeline-meta{display:flex;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap;margin-bottom:var(--space-3);color:var(--color-text-muted);font-size:var(--text-sm)}
    .cv-grid{grid-template-columns:repeat(2,1fr)}
    .cv-badge{display:inline-flex;padding:.45rem .7rem;border-radius:var(--radius-full);background:var(--color-primary-highlight);color:var(--color-primary);font-size:var(--text-xs);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .contact-card{padding:var(--space-8)}
    .contact-grid{grid-template-columns:1.1fr .9fr}
    .contact-list{display:grid;gap:var(--space-4);margin-top:var(--space-6)}
    .contact-item{padding:var(--space-4);border-radius:var(--radius-lg);background:var(--color-surface-2);border:1px solid color-mix(in srgb,var(--color-text) 8%, transparent)}
    .footer{padding:var(--space-8) 0 var(--space-12);border-top:1px solid color-mix(in srgb,var(--color-text) 10%, transparent);color:var(--color-text-muted)}
    @media (max-width: 980px){
      .hero-grid,.section-intro,.contact-grid,.services-grid,.proof-grid,.cv-grid,.metric-grid{grid-template-columns:1fr}
      h1{max-width:14ch}
    }
    @media (max-width: 760px){
      .menu-toggle{display:inline-flex}
      .nav{display:none;position:absolute;left:1rem;right:1rem;top:calc(100% + .5rem);padding:1rem;background:var(--color-surface);border:1px solid color-mix(in srgb,var(--color-text) 10%, transparent);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);flex-direction:column;align-items:flex-start}
      .nav.open{display:flex}
      .header-actions{display:flex;gap:.5rem;align-items:center}
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <div id="root"></div>
  <script type="text/babel">
    const { useMemo, useState, useEffect } = React;

    const data = {
      name: 'Konstantin Podlesnykh',
      title: 'Systems Analyst, Service Architect, Data & AI Project Specialist',
      location: 'France',
      email: 'order.underwood@gmail.com',
      intro: 'I help teams turn vague product, broad datasets or integration ideas into clear technical delivery and structured products. My service mix combines systems and data analysis, API and data design, stakeholder communication, lightweight development, and practical AI or data workflows.',
      services: [
        {
          title: 'Systems Analysis & Specifications',
          text: 'Translate business needs into atomic technical tasks, process descriptions, UML flows, data mappings, and clear delivery documentation for developers and QA.',
          tags: ['Requirements gathering', 'UML / BPMN', 'API flows', 'Task decomposition']
        },
        {
          title: 'Service & Integration Architecture',
          text: 'Design service interactions, map integrations, structure JSON/XML/CSV exchanges, and document REST, SOAP, Kafka, RabbitMQ, gRPC, or GraphQL-based solutions.',
          tags: ['REST / SOAP', 'Kafka / RabbitMQ', 'Data mapping', 'Technical documentation']
        },
        {
          title: 'Software Development',
          text: 'Building Web servicies and applications from scratch using whole spectrum of modern frameworks and AI-tools.',
          tags: ['Python', 'React', 'NodeJS']
        },
        {
          title: 'DevOps-Aware Delivery Support',
          text: 'Support feature delivery with CI/CD awareness, server log review, config troubleshooting, release coordination, and effective collaboration with DevOps specialists.',
          tags: ['CI/CD basics', 'Logs & configs', 'Release support', 'Cross-team coordination']
        },
        {
          title: 'Data & Reporting Workflows',
          text: 'Build practical analytics workflows with Python, SQL, dashboards, validation logic, and reporting structures that improve visibility and reduce manual work.',
          tags: ['Python', 'SQL', 'Power BI / Tableau basics', 'Automation']
        },
        {
          title: 'AI Product & Project Coordination',
          text: 'Coordinate AI-flavored projects with prompt-aware thinking, backlog management, delivery planning, and communication across business, product, and technical teams.',
          tags: ['AI projects', 'Backlog prioritization', 'Stakeholder management', 'Delivery']
        },
        {
          title: 'Prototype & Web Product Support',
          text: 'Contribute as a hands-on generalist to React, TypeScript, or Python-based product prototypes, internal tools, parsers, and utility scripts.',
          tags: ['React', 'TypeScript', 'Python', 'Internal tools']
        }
      ],
      proof: [
        { value: '10+', label: 'projects handled' },
        { value: '15+', label: 'data and integration initiatives' },
        { value: '4+', label: 'professional angles combined' }
      ],
      timeline: [
        {
          role: 'Software Development / DevOps / Data Analyst',
          org: 'Legislation analytics service',
          period: '',
          bullets: [
            'Built a service for parsing and analyzing legislative text from official public sources.',
            'Initial text analysis with further automatization using Data Analytics and LLM tools',
            'DevOps'
          ]
        },
        {
          role: 'IT Business Analyst',
          org: 'AI Due Diligence platform AIvanyan',
          period: '',
          bullets: [
            'Building and optimization overall process of AI-acceleration of Due Diligence process from scratch.',
            'QA',
            'CustDev'
          ]
        },
        {
          role: 'Software Development / IT consulting / DevOps',
          org: 'SEO GPT',
          period: '',
          bullets: [
            'Built a React and NestJS web application for SEO text generation powered by OpenAI APIs.',
            'Combined product thinking with implementation and early-stage service shaping.',
            'Prepared comprehensive documentation and market research.',
            'DevOps'
          ]
        },
        {
          role: 'Software Development / Product Management / DevOps',
          org: 'Pactum Privacy',
          period: '',
          bullets: [
            'Built a React App for a privacy control and compliance.',
            'Conducted several CustDev stages.',
            'Launched a product in Google Platforms.',
            'DevOps',
            'SEO optimization'
          ]
        },
        {
          role: 'Software Development / Product Management',
          org: 'Nlogic',
          period: '',
          bullets: [
            'Led integration initiatives, created specifications, mapped processes, and coordinated tense delivery periods with developers.',
            'Software Development with Python, QA, documentation, training, and AI-related product work.',
            'Managed multiple projects for legal, telecom, and financial contexts.'
          ]
        }
      ],
      cvAngles: [
        {
          title: 'Services Architect',
          summary: 'Strong fit for integration-heavy companies that need someone between business, architecture, and delivery.',
          points: ['API and integration analysis', 'SQL and data modeling', 'Confluence-ready specifications']
        },
        {
          title: 'AI Project Manager',
          summary: 'Useful for AI product coordination, backlog ownership, and communication across mixed technical and non-technical teams.',
          points: ['AI and prompt literacy', 'Project planning', 'Stakeholder communication']
        },
        {
          title: 'Junior Software Developer',
          summary: 'Able to contribute directly to prototypes, parsers, internal tools, and practical product implementation.',
          points: ['React / TS', 'Python scripts', 'Web app support']
        },
        {
          title: 'Junior Data Analyst',
          summary: 'Adds reporting, data quality, automation, and dashboard thinking to the service offer.',
          points: ['Python / pandas', 'SQL', 'Data visualization basics']
        }
      ]
    };

    function Logo() {
      return (
              <svg viewBox="0 0 64 64" width="28" height="28" aria-label="UP logo" fill="none">
                <rect x="8" y="8" width="48" height="48" rx="14" stroke="currentColor" strokeWidth="3" />
                <path d="M22 20V36C22 41.523 26.477 46 32 46C37.523 46 42 41.523 42 36V20" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
      );
    }

    function App() {
      const prefersDark = typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const [theme, setTheme] = useState(prefersDark ? 'dark' : 'light');
      const [menuOpen, setMenuOpen] = useState(false);
      useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
      const nav = useMemo(() => [
        { href: '#services', label: 'Services' },
        { href: '#experience', label: 'Experience' },
        { href: '#contact', label: 'Contact' }
      ], []);

      return (
        <>
          <header className="site-header">
            <div className="container header-row">
              <a className="brand" href="#top">
                <span className="brand-mark"><Logo /></span>
                <div>
                  <div className="brand-name">Konstantin Podlesnykh</div>
                  <div className="muted" style={{fontSize:'var(--text-xs)'}}>Independent tech services and consulting</div>
                </div>
              </a>
              <nav className={`nav ${menuOpen ? 'open' : ''}`} aria-label="Primary">
                {nav.map(item => <a key={item.href} href={item.href} onClick={() => setMenuOpen(false)}>{item.label}</a>)}
              </nav>
              <div className="header-actions">
                <button className="menu-toggle" aria-label="Toggle menu" onClick={() => setMenuOpen(v => !v)}>Menu</button>
                <button className="theme-toggle" data-theme-toggle aria-label="Toggle color mode" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
                  {theme === 'dark' ? 'Light' : 'Dark'}
                </button>
              </div>
            </div>
          </header>

          <main id="content">
            <section className="hero" id="top">
              <div className="container hero-grid">
                <div>
                  <span className="eyebrow">France-based · Remote-friendly</span>
                  <h1>Professional IT consulting.</h1>
                  <p>{data.intro}</p>
                  <div className="hero-actions">
                    <a className="btn btn-primary" href="#contact">Discuss your project</a>
                    <a className="btn btn-secondary" href="#services">See services</a>
                  </div>
                </div>
                <aside className="hero-card" aria-label="Profile summary">
                  <div>
                    <div className="kicker">Core profile</div>
                    <h3 style={{fontFamily:'var(--font-body)', fontWeight:700, fontSize:'var(--text-lg)'}}>{data.title}</h3>
                    <p className="muted" style={{marginTop:'var(--space-3)'}}>English / Russian / French</p>
                  </div>
                  <div className="metric-grid">
                    {data.proof.map(item => (
                      <div className="metric" key={item.label}>
                        <strong>{item.value}</strong>
                        <span className="muted" style={{fontSize:'var(--text-sm)'}}>{item.label}</span>
                      </div>
                    ))}
                  </div>
                  <div className="pill-row">
                    {['Systems analysis', 'Data Analysis', 'Integrations','DevOps','SQL','Python','React','AI projects'].map(tag => <span className="pill" key={tag}>{tag}</span>)}
                  </div>
                </aside>
              </div>
            </section>

            <section id="services">
              <div className="container">
                <div className="section-intro">
                  <div>
                    <div className="kicker">Services</div>
                    <h2>What I can help you with</h2>
                  </div>
                </div>
                <div className="services-grid">
                  {data.services.map(service => (
                    <article className="card" key={service.title}>
                      <h3>{service.title}</h3>
                      <p className="muted">{service.text}</p>
                      <div className="pill-row">
                        {service.tags.map(tag => <span className="pill" key={tag}>{tag}</span>)}
                      </div>
                    </article>
                  ))}
                </div>
              </div>
            </section>

            <section id="experience">
              <div className="container">
                <div className="section-intro">
                  <div>
                    <div className="kicker">Experience</div>
                    <h2 >Portfolio</h2>
                  </div>
                </div>
                <div className="timeline">
                  {data.timeline.map(item => (
                    <article className="timeline-item" key={item.role + item.org}>
                      <div className="timeline-meta">
                        <strong>{item.org}</strong>
                      </div>
                      <h3 style={{fontFamily:'var(--font-body)', fontWeight:700, fontSize:'var(--text-lg)', marginBottom:'var(--space-3)'}}>{item.role}</h3>
                      <ul role="list" style={{display:'grid', gap:'var(--space-2)'}}>
                        {item.bullets.map(point => <li key={point} className="muted"> {point}</li>)}
                      </ul>
                    </article>
                  ))}
                </div>
              </div>
            </section>

            <section id="contact">
              <div className="container">
                <div className="contact-card">
                  <div className="contact-grid">
                    <div>
                      <div className="kicker">Contact</div>
                      <h2>Let’s shape the right service package</h2>
                    </div>
                    <div className="contact-list">
                      <div className="contact-item">
                        <strong>Email</strong>
                        <div><a href={`mailto:${data.email}`} style={{color:'var(--color-primary)', textDecoration:'none'}}>{data.email}</a></div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </section>
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
